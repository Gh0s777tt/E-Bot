<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientTransform="translate(256 230) scale(330)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#161618"/>
      <stop offset="1" stop-color="#060607"/>
    </radialGradient>
    <linearGradient id="slash" x1="256" y1="110" x2="256" y2="404" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff2b36"/>
      <stop offset="1" stop-color="#a8060f"/>
    </linearGradient>
    <radialGradient id="spark" cx="0" cy="0" r="1" gradientTransform="translate(322 200) scale(150)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E50914" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#E50914" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- czarne tło (subtelna winieta, czyta się jako czerń) -->
  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <!-- delikatny błysk tylko za slashem (dla głębi, nie rozjaśnia całości) -->
  <rect width="512" height="512" rx="118" fill="url(#spark)"/>

  <!-- pierścień kołowy (czysty po kadrze kołowym avatara) -->
  <circle cx="256" cy="256" r="236" stroke="#E50914" stroke-opacity="0.6" stroke-width="7"/>

  <!-- krwisty slash (motyw slash-command) -->
  <path d="M300 124 L372 124 L232 388 L160 388 Z" fill="url(#slash)"/>

  <!-- monogram E -->
  <text x="206" y="372" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="300" font-weight="900" fill="#f6f6f8">E</text>
</svg>
