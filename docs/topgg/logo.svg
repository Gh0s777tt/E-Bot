<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0c0e"/>
      <stop offset="1" stop-color="#1c0a0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(256 168) scale(360)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E50914" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#E50914" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slash" x1="256" y1="96" x2="256" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff2b36"/>
      <stop offset="1" stop-color="#a8060f"/>
    </linearGradient>
  </defs>

  <!-- tło (kwadrat z zaokrągleniem na podgląd; po kadrze kołowym widać samo tło) -->
  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect width="512" height="512" rx="118" fill="url(#glow)"/>

  <!-- pierścień kołowy (zostaje czysty po przycięciu do koła na avatarze) -->
  <circle cx="256" cy="256" r="236" stroke="#E50914" stroke-opacity="0.55" stroke-width="7"/>

  <!-- krwisty slash (motyw slash-command) -->
  <path d="M300 120 L372 120 L232 392 L160 392 Z" fill="url(#slash)"/>

  <!-- monogram E -->
  <text x="206" y="372" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="300" font-weight="900" fill="#f5f5f7">E</text>
</svg>
