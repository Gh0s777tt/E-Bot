# MkDocs Material — portal dokumentacji E-Bot (docs-as-code → GitLab Pages).
# Budowa lokalnie:  python3 -m venv .venv && .venv/bin/pip install -r requirements.txt
#                   .venv/bin/mkdocs serve   (podgląd http://127.0.0.1:8000)
# CI: job `pages` w .gitlab-ci.yml buduje do public/ i publikuje na GitLab Pages.

site_name: E-Bot · Dokumentacja
site_description: Dokumentacja ekosystemu E-Forge — bot Discord, panel, biblioteka gier, kolektory.
site_author: E-Forge
docs_dir: docs
site_dir: site

# Repo = źródło prawdy (GitLab). Edit-link kieruje do plików w GitLabie.
repo_name: Gh0s777tt/e-bot
repo_url: https://gitlab.com/Gh0s777tt/e-bot
edit_uri: -/edit/main/docs/

copyright: © 2026 E-Forge — wszelkie prawa zastrzeżone.

# Walidacja: dokumenty świadomie linkują do plików ŹRÓDŁOWYCH poza docs/ (../dashboard/…,
# ../bot/…). To nie są zepsute odnośniki docs↔docs, więc je ignorujemy — ale realne błędy
# nawigacji (literówka w nav, brak pliku) nadal wywalają --strict build.
validation:
  nav:
    omitted_files: info
    not_found: warn
  links:
    not_found: ignore
    unrecognized_links: ignore
    absolute_links: ignore
    anchors: ignore

theme:
  name: material
  language: pl
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Przełącz na jasny
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Przełącz na ciemny
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/gitlab

extra_css:
  - stylesheets/extra.css

plugins:
  # 'pl' nie jest wspieranym stemmerem lunr — zostawiamy domyślny (separator obejmuje myślnik/podkreślenie).
  - search:
      separator: '[\s\-\.\_]+'

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Pliki-artefakty GitHub Wiki (nawigacja/stopka) nie wchodzą do nav portalu.
not_in_nav: |
  /wiki/_Sidebar.md
  /wiki/_Footer.md

nav:
  - Start: index.md
  - Utrzymanie (operacje): MAINTENANCE.md
  - Architektura i plan:
      - Architektura: ARCHITECTURE.md
      - Roadmapa: ROADMAP.md
      - Fazy i status: PHASES.md
      - Analiza / right-sizing: ANALIZA.md
      - Analiza funkcji: ANALIZA-FUNKCJI.md
      - Analiza funkcji (2): ANALIZA-FUNKCJI-2.md
      - Plan Fazy 4: FAZA-4-PLAN.md
  - Wiki użytkownika:
      - Start: wiki/Getting-Started.md
      - Strona główna: wiki/Home.md
      - Komendy: wiki/Commands.md
      - Moduły: wiki/Modules.md
      - Dashboard: wiki/Dashboard.md
      - Bezpieczeństwo: wiki/Security.md
      - FAQ: wiki/FAQ.md
  - Wdrożenia i infra:
      - Hosting: HOSTING.md
      - Aktywacja — deploy: AKTYWACJA-DEPLOY.md
      - Aktywacja — infra: AKTYWACJA-INFRA.md
      - Aktywacja — community: AKTYWACJA-COMMUNITY.md
      - Aktywacja — Twitch Sub: AKTYWACJA-TWITCH-SUB.md
      - Hardening produkcji: HARDENING-PROD.md
      - Sharding: SHARDING.md
  - Marketplace i Premium:
      - Plan Marketplace: PLAN-MARKETPLACE.md
      - Aktywacja Stripe: AKTYWACJA-STRIPE.md
      - Sandbox M6: PLAN-M6-SANDBOX.md
      - Review bezpieczeństwa: SECURITY-REVIEW-MARKETPLACE.md
  - Bezpieczeństwo:
      - Sekrety i rotacja: SECRETS.md
  - Design:
      - System wizualny: DESIGN.md
  - top.gg:
      - Przewodnik: TOPGG.md
      - Komendy (top.gg): topgg/commands.md
  - Audyt:
      - AUDYT 2026-07-13: audit/AUDIT-2026-07-13.md
