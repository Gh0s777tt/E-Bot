name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # ręczne uruchomienie z zakładki Actions / `gh workflow run CI` (test bez dummy-commita)

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Docs sync (PHASES/ROADMAP/README ↔ CHANGELOG)
        run: node scripts/check-docs-sync.mjs

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome ci dashboard web bot

      - name: Typecheck (dashboard + web + bot)
        run: |
          pnpm --filter bot-dc-dashboard exec tsc --noEmit
          pnpm --filter bot-dc-web exec tsc --noEmit
          pnpm --filter bot-dc-bot exec tsc --noEmit

      - name: Testy jednostkowe (Vitest)
        run: pnpm exec vitest run

      - name: Build (dashboard + web)
        run: |
          pnpm --filter bot-dc-dashboard build
          pnpm --filter bot-dc-web build

      - name: Przeglądarki Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Testy E2E panelu (Playwright)
        run: pnpm exec playwright test
