name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome ci dashboard web

      - name: Typecheck (dashboard + web)
        run: |
          pnpm --filter bot-dc-dashboard exec tsc --noEmit
          pnpm --filter bot-dc-web exec tsc --noEmit

      - name: Build (dashboard + web)
        run: |
          pnpm --filter bot-dc-dashboard build
          pnpm --filter bot-dc-web build
