name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # poniedziałek 06:00 UTC

permissions:
  actions: read # repo prywatne: pozwala CodeQL czytać dane przebiegu (get-a-workflow-run); bez tego "Resource not accessible by integration"
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analiza (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          # Upload wyników do Code Scanning (zakładka Security) wymaga GitHub Advanced Security,
          # niedostępnego na repo prywatnym w planie Pro — bez tego upload zwraca błąd
          # "Code scanning is not enabled for this repository" i wywala cały job.
          # Dlatego nie wysyłamy SARIF do GitHuba, tylko zapisujemy go jako artefakt (krok niżej).
          # Po przejściu repo na public LUB włączeniu Code Scanning zmień na: always
          upload: never
          output: codeql-results
      - name: Wyniki CodeQL (SARIF) jako artefakt
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif
          path: codeql-results
          if-no-files-found: warn
